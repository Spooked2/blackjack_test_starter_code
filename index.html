<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Blackjack</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/dom_blackjack.js"></script>
</head>
<body>

<main>

    <div id="winTracker">

        <div id="dealerWinContainer" class="winContainer">

            <p>Dealer wins</p>
            <h3 id="dealerWinLabel">-</h3>

        </div>

        <div id="playerWinContainer" class="winContainer">

            <p>Player Wins</p>
            <h3 id="playerWinLabel">-</h3>

        </div>

    </div>

    <div id="mainGameContainer">
        <section id="dealerContainer" class="mainContainer">

            <h1 id="dealerTitle">Dealer</h1>
            <h2 id="dealerTotalLabel">-</h2>

            <div id="dealerCardContainer" class="cardContainer"></div>

        </section>

        <h1 id="resultsLabel"></h1>

        <section id="playerContainer" class="mainContainer">

            <div id="playerCardContainer" class="cardContainer"></div>

            <h2 id="playerTotalLabel">-</h2>
            <h1 id="playerTitle">Player</h1>

        </section>
    </div>


    <section id="buttonContainer">

        <button id="newGameButton">New game</button>
        <button id="hitButton">Hit</button>
        <button id="standButton">Stand</button>

    </section>

</main>

</body>
</html>
